services:
    web:
        image: nginx:1.31.1-alpine
        restart: always
        volumes:
            - .:/var/www/html
            - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        ports:
            - "${APP_PORT}:8080"
        depends_on:
            - php
            - db
        networks:
            - backend
    db:
        image: mariadb:11
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
        ports:
            - "${MYSQL_PORT}:3306"
        networks:
            - backend
    php:
        build:
            context: .
            dockerfile: .docker/Dockerfile
        user: "${APP_UID}:${APP_GID}"
        env_file: .env
        environment:
            PMA_FORCE_SSL: "false"
            PMA_ABSOLUTE_URI: "http://localhost:8080/"
            PMA_HOST: db
            PMA_PORT: 3306
            PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
        restart: always
        volumes:
            - ./.docker/config.inc.php:/var/www/html/config.inc.php
            - .:/var/www/html
        networks:
            - backend
    composer:
        image: composer
        user: "${APP_UID}:${APP_GID}"
        volumes:
            - .:/app
        working_dir: /app
        entrypoint: [ 'composer' ]

    selenium:
        image: selenium/standalone-chrome
        container_name: selenium
        shm_size: 2gb
        ports:
            - "4444:4444"
        environment:
            SE_LOG_LEVEL: ALL
            SE_NODE_MAX_SESSIONS: 1
            SE_NODE_SESSION_TIMEOUT: 800
        networks:
            - backend
networks:
    backend:
